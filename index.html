<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>これは、植物とともに暮らす</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0a;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:0;}
.g{width:100%;max-width:390px;font-family:sans-serif;background:#fff;min-height:100vh;position:relative;}

/* タイトル画面 */
#titleScreen{position:fixed;inset:0;z-index:100;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;background:#0a0a14;}
#titleScreen img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
#titleText{position:relative;z-index:2;text-align:center;padding:20px;}
#titleText h1{font-size:22px;color:#fff;letter-spacing:4px;text-shadow:0 0 20px rgba(255,192,203,0.8);margin-bottom:12px;}
#titleText h2{font-size:14px;color:#ffcce0;letter-spacing:2px;}
#tapHint{position:absolute;bottom:40px;color:rgba(255,255,255,0.6);font-size:12px;animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:0.3;}50%{opacity:1;}}

.topbar{background:#f5f5f5;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;}
.stglabel{font-size:13px;color:#888;}.stgname{font-size:14px;font-weight:500;color:#333;}
.scene{height:240px;position:relative;overflow:hidden;cursor:pointer;touch-action:none;}
canvas{position:absolute;inset:0;width:100%;height:100%;}

/* オーバーレイ */
.ov{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:20;flex-direction:column;gap:8px;}
.ov.dark{background:rgba(0,0,0,0.65);}
.ov.pink{background:rgba(255,192,203,0.4);}
.ov img{max-width:80%;max-height:75%;border-radius:10px;object-fit:contain;}
.ov-label{font-size:13px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.8);text-align:center;padding:0 16px;}

/* ひとり言 */
#monologue{position:absolute;bottom:8px;left:8px;right:8px;background:rgba(0,0,0,0.7);border-radius:10px;padding:8px 12px;display:none;z-index:18;}
#monologue-img{width:50px;height:55px;object-fit:contain;float:left;margin-right:8px;}
#monologue-text{font-size:11px;color:#fff;line-height:1.5;overflow:hidden;}

/* ミニゲーム */
#minigame{position:absolute;inset:0;background:rgba(0,0,0,0.75);z-index:25;display:none;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
#mg-title{font-size:14px;color:#fff;font-weight:500;}
#mg-instruction{font-size:12px;color:#ddd;}
#mg-gauge-wrap{width:80%;height:20px;background:rgba(255,255,255,0.2);border-radius:10px;overflow:hidden;}
#mg-gauge{height:100%;width:50%;border-radius:10px;transition:width 0.1s;}
#mg-result{font-size:16px;color:#fff;font-weight:500;display:none;}

/* 鳥HP */
.hpw{position:absolute;bottom:8px;left:16px;right:16px;height:8px;background:rgba(0,0,0,0.3);border-radius:4px;display:none;z-index:15;overflow:hidden;}
.hpf{height:100%;background:#E24B4A;border-radius:4px;transition:width 0.15s;}

/* イベントバナー */
.evb{position:absolute;top:8px;left:16px;right:16px;text-align:center;font-size:12px;font-weight:500;color:#fff;padding:5px 10px;border-radius:8px;display:none;z-index:15;}
.evb.bi{background:rgba(180,50,50,0.9);}.evb.ty{background:rgba(30,70,200,0.9);}

/* 台風スワイプ表示 */
#typhoon-arrow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:36px;color:#fff;text-shadow:0 0 10px #fff;display:none;z-index:16;pointer-events:none;}

.msg{background:#f5f5f5;padding:10px 16px;font-size:13px;color:#333;min-height:42px;line-height:1.5;}
.gen{font-size:11px;color:#aaa;padding:2px 16px 6px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:6px 12px;}
.stat{background:#f5f5f5;border-radius:8px;padding:8px;}
.slbl{font-size:11px;color:#888;margin-bottom:5px;}
.sb{height:5px;border-radius:3px;background:#e0e0e0;overflow:hidden;}
.sf{height:100%;border-radius:3px;transition:width 0.4s;}
.sf.w{background:#85B7EB;}.sf.s{background:#EF9F27;}.sf.l{background:#ED93B1;}
.acts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 12px 12px;}
button.ab{background:#f5f5f5;border:1px solid #ddd;border-radius:8px;padding:8px 4px;cursor:pointer;font-size:11px;color:#333;font-family:sans-serif;}
button.ab:active{transform:scale(0.96);}
.ic{font-size:18px;display:block;margin-bottom:3px;}
.pbw{height:3px;background:#e0e0e0;}.pbf{height:100%;background:#ED93B1;transition:width 0.6s;}
</style>
</head>

function resize(){cv.width=scene.offsetWidth;cv.height=scene.offsetHeight;}

function sm(t){ov('msg').textContent=t;}
function ss(id,v){ov(id).style.width=Math.max(0,Math.min(100,v))+'%';}
function ui(){ss('bw',S.water);ss('bs',S.sun);ss('bl',S.love);ov('sn').textContent=STAGES[S.stage];ov('pb').style.width=Math.min(100,S.growth)+'%';ov('gen').textContent=S.gen+'代目';}
function hideAllOv(){['ovBirdWarn','ovBirdAttack','ovBird2_1','ovBird2_2','ovTyphoon','ovBloom','ovCry','ovSleep','ovSing','evBird','evTyphoon','hpw','monologue'].forEach(id=>{const e=ov(id);if(e)e.style.display='none';});ov('typhoon-arrow').style.display='none';}

function ol(fn,fc,sc,lw){ctx.save();ctx.lineJoin='round';ctx.lineCap='round';ctx.strokeStyle=sc||'#1a1a1a';ctx.lineWidth=lw||3;fn();ctx.stroke();ctx.fillStyle=fc;fn();ctx.fill();ctx.restore();}
function hl(x,y,rx,ry,a){ctx.save();ctx.globalAlpha=0.38;ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(x,y,rx,ry,a||0,0,Math.PI*2);ctx.fill();ctx.restore();}

// ミニゲーム
function startMinigame(type){
  S.mgActive=true;S.mgType=type;S.mgValue=50;
  const mg=ov('minigame');mg.style.display='flex';
  ov('mg-result').style.display='none';
  const g=ov('mg-gauge');
  if(type==='water'){
    ov('mg-title').textContent='💧 水やり！';
    ov('mg-instruction').textContent='左右にスワイプしてじょうろを傾けよう！';
    g.style.background='#85B7EB';
  } else if(type==='sun'){
    ov('mg-title').textContent='☀️ ひなたへ！';
    ov('mg-instruction').textContent='緑のゾーンに合わせてタップ！';
    g.style.background='#EF9F27';
    autoMoveSun();
  } else if(type==='love'){
    ov('mg-title').textContent='🎵 うたう！';
    ov('mg-instruction').textContent='リズムよくタップ！';
    g.style.background='#ED93B1';
  }
  ov('mg-gauge').style.width='50%';
}

let sunDir=1,sunInterval=null;
function autoMoveSun(){
  if(sunInterval)clearInterval(sunInterval);
  sunInterval=setInterval(()=>{
    if(!S.mgActive||S.mgType!=='sun'){clearInterval(sunInterval);return;}
    S.mgValue+=sunDir*3;
    if(S.mgValue>=90){sunDir=-1;}
    if(S.mgValue<=10){sunDir=1;}
    ov('mg-gauge').style.width=S.mgValue+'%';
  },50);
}

function mgTap(){
  if(!S.mgActive)return;
  if(S.mgType==='love'){
    S.mgValue=Math.min(100,S.mgValue+15);
    ov('mg-gauge').style.width=S.mgValue+'%';
    if(S.mgValue>=80)finishMg();
  } else if(S.mgType==='sun'){
    if(S.mgValue>=35&&S.mgValue<=65){S.mgValue=80;}
    else{S.mgValue=20;}
    ov('mg-gauge').style.width=S.mgValue+'%';
    if(sunInterval)clearInterval(sunInterval);
    finishMg();
  }
}

function mgSwipe(dx){
  if(!S.mgActive||S.mgType!=='water')return;
  S.mgValue=Math.min(100,Math.max(0,S.mgValue+dx*0.3));
  ov('mg-gauge').style.width=S.mgValue+'%';
  if(S.mgValue>=75||S.mgValue<=25)finishMg();
}

function finishMg(){
  S.mgActive=false;
  if(sunInterval)clearInterval(sunInterval);
  const success=S.mgValue>=40&&S.mgValue<=85;
  const great=S.mgValue>=60&&S.mgValue<=85;
  S.mgSuccess=success;
  const res=ov('mg-result');
  res.style.display='block';
  if(great){res.textContent='🌟 大成功！';}
  else if(success){res.textContent='✨ 成功！';}
  else{res.textContent='😅 失敗…';}
  setTimeout(()=>{
    ov('minigame').style.display='none';
    applyActResult(S.mgType,great?'great':success?'success':'fail');
  },900);
}

function applyActResult(type,result){
  const msgs={
    water:{great:'じょうろがばっちり決まった！お花が喜んでる🌱',success:'なんとか水やりできた😊',fail:'あれ、水が全部こぼれた…😅'},
    sun:{great:'完璧な日当たり！棒人間がドヤ顔した☀️',success:'まあまあの日当たりかな',fail:'日陰に置いちゃった…ごめん😓'},
    love:{great:'最高の鼻歌！お花が揺れた🎵',success:'まあまあのうた♪',fail:'音程がちょっとハズレてた…'}
  };
  const bonus={great:{w:25,s:15,l:20},success:{w:15,s:10,l:12},fail:{w:5,s:3,l:3}};
  const b=bonus[result];
  if(type==='water'){S.water=Math.min(100,S.water+b.w);S.love=Math.min(100,S.love+3);}
  else if(type==='sun'){S.sun=Math.min(100,S.sun+b.s);S.water=Math.max(0,S.water-3);}
  else if(type==='love'){S.love=Math.min(100,S.love+b.l);S.sun=Math.min(100,S.sun+3);}
  sm(msgs[type][result]);
  checkGrowth();ui();
}

function doAct(t){
  if(S.birdActive||S.birdWarn||S.bird2Step>0){sm('まず鳥をなんとかして！');return;}
  if(S.typhoonActive){sm('台風中！スワイプで支えて！');return;}
  if(S.stage>=4){sm('今は種を見つけるのを待って…');return;}
  if(S.mgActive)return;
  if(t==='rest'){
    S.sleeping=true;S.sleepTimer=160;S.showSleep=true;S.sleepImgTimer=100;
    S.love=Math.min(100,S.love+10);
    sm('芽の横でごろんと昼寝した');checkGrowth();ui();
  } else if(t==='love'){
    S.showSing=true;S.singTimer=80;
    startMinigame('love');
  } else {
    startMinigame(t);
  }
}

function checkGrowth(){
  if(S.stage>=3)return;
  const avg=(S.water+S.sun+S.love)/3;
  S.growth=Math.min(99.9,S.growth+(avg>50?1.2:0.3));
  if(S.growth>=75&&S.stage<3){
    S.stage=3;S.showBloom=true;S.bloomTimer=200;S.witherTimer=700;
    sm('🌸 まんかい！棒人間が飛び上がって喜んだ！');
    ov('ovBloom').style.display='flex';
  }
  else if(S.growth>=45&&S.stage<2)S.stage=2;
  else if(S.growth>=20&&S.stage<1)S.stage=1;
  ui();
}

function wither(){
  S.stage=4;S.showCry=true;S.cryTimer=200;ui();
  ov('ovCry').style.display='flex';
  sm('お花が散っていく…でも綺麗だった');
  setTimeout(()=>{S.stage=5;ui();sm('枯れた花の中に種を見つけた！タップして次の代を植えよう🌰');},4000);
}

function newGen(){
  S.gen++;S.water=60;S.sun=60;S.love=60;S.growth=0;S.stage=0;
  S.witherTimer=0;S.birdActive=false;S.birdWarn=false;S.bird2Step=0;S.typhoonActive=false;
  hideAllOv();ui();
  S.showSleep=true;S.sleepImgTimer=120;
  ov('ovSleep').style.display='flex';
  sm(S.gen+'代目の種を植えた。わくわく待機中…🌱');
}

function maybeEvent(){
  if(S.birdActive||S.birdWarn||S.bird2Step>0||S.typhoonActive||S.stage<1||S.stage>=4||S.mgActive)return;
  const r=Math.random();
  if(r<0.0007){
    S.birdPattern=Math.random()<0.5?1:2;
    if(S.birdPattern===1){
      S.birdWarn=true;S.birdWarnTimer=90;
      S.birdHp=3;S.birdX=cv.width+40;S.birdY=28+Math.random()*38;S.birdVx=-2;
      ov('ovBirdWarn').style.display='flex';
      sm('なんか来る気がする…！タップして！');
    } else {
      S.bird2Step=1;S.bird2Timer=90;
      ov('ovBird2_1').style.display='flex';
      sm('なんか来た…タップして！');
    }
  } else if(r<0.0013){
    S.typhoonActive=true;S.supported=false;S.typhoonTimer=360;
    S.typhoonDir=Math.random()<0.5?1:-1;
    ov('evTyphoon').style.display='block';
    ov('typhoon-arrow').style.display='block';
    ov('typhoon-arrow').textContent=S.typhoonDir>0?'👉':'👈';
    ov('ovTyphoon').style.display='flex';
    sm('🌀 台風が来た！'+( S.typhoonDir>0?'右':'左')+'にスワイプして支えて！');
  } else if(r<0.0018&&!S.showMono){
    S.showMono=true;S.monoTimer=240;
    const txt=MONOLOGUES[Math.floor(Math.random()*MONOLOGUES.length)];
    ov('monologue-text').textContent=txt;
    ov('monologue').style.display='block';
  }
}

// タッチ・クリック処理
scene.addEventListener('touchstart',e=>{
  S.swipeStartX=e.touches[0].clientX;
  S.swipeStartY=e.touches[0].clientY;
  handleSceneTap(e.touches[0].clientX,e.touches[0].clientY);
},{passive:true});
scene.addEventListener('click',e=>handleSceneTap(e.clientX,e.clientY));
scene.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-S.swipeStartX;
  handleSwipe(dx);
},{passive:true});

function handleSceneTap(cx,cy){
  if(S.mgActive){mgTap();return;}
  if(S.birdWarn){
    S.birdWarn=false;S.birdWarnTimer=0;
    ov('ovBirdWarn').style.display='none';
    S.birdActive=true;
    ov('evBird').style.display='block';
    ov('hpw').style.display='block';
    sm('🐦 鳥を直接タップして追い払え！');return;
  }
  if(S.birdActive){
    const rect=scene.getBoundingClientRect();
    const tx=(cx-rect.left)/rect.width*cv.width;
    const ty=(cy-rect.top)/rect.height*cv.height;
    const bx=S.birdX,by=S.birdY;
    const dist=Math.sqrt((tx-bx)**2+(ty-by)**2);
    if(dist<45){
      S.birdHp--;
      ov('hpf').style.width=(S.birdHp/3*100)+'%';
      if(S.birdHp<=0){
        S.birdActive=false;ov('evBird').style.display='none';ov('hpw').style.display='none';
        S.love=Math.min(100,S.love+18);ui();sm('棒人間が鳥を追い払った！お花は無事！');
      } else sm('もう'+S.birdHp+'回当てて！');
    } else sm('外れた！鳥をよく狙って！');
    return;
  }
  if(S.bird2Step===1){
    S.bird2Step=2;S.bird2Timer=90;
    ov('ovBird2_1').style.display='none';
    ov('ovBird2_2').style.display='flex';
    sm('…ただ見てただけみたい。よかった😮‍💨');return;
  }
  if(S.bird2Step===2){
    S.bird2Step=0;ov('ovBird2_2').style.display='none';sm('びっくりした…');return;}
  if(S.typhoonActive){return;}
  if(S.showBloom){ov('ovBloom').style.display='none';S.showBloom=false;return;}
  if(S.showCry){ov('ovCry').style.display='none';S.showCry=false;return;}
  if(S.stage===5)newGen();
}

function handleSwipe(dx){
  if(S.typhoonActive){
    const correct=(S.typhoonDir>0&&dx>30)||(S.typhoonDir<0&&dx<-30);
    if(correct){
      S.supported=true;S.love=Math.min(100,S.love+8);ui();
      sm('棒人間が踏ん張った！がんばれ！');
    } else sm('逆！'+( S.typhoonDir>0?'右':'左')+'にスワイプ！');
    return;
  }
  if(S.mgActive&&S.mgType==='water')mgSwipe(dx);
}

// 背景・描画
function drawBg(W,H){
  const d=S.dayTime,t=d<0.5?d/0.5:1-(d-0.5)/0.5;
  if(S.typhoonActive){ctx.fillStyle='#1a2040';ctx.fillRect(0,0,W,H);drawRain(W,H);}
  else{
    const g=ctx.createLinearGradient(0,0,0,H);
    const r1=Math.round(13+t*122),g1=Math.round(27+t*179),b1=Math.round(42+t*193);
    const r2=Math.round(17+t*83),g2=Math.round(32+t*148),b2=Math.round(26+t*94);
    g.addColorStop(0,`rgb(${r1},${g1},${b1})`);g.addColorStop(1,`rgb(${r2},${g2},${b2})`);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    if(d<0.2||d>0.85){drawStars(W,H);drawMoon(W,H);}else{drawSun(W,H,t);}
  }
  ctx.fillStyle='#3b6d11';ctx.fillRect(0,H-46,W,10);
  ctx.fillStyle='#5c3d2e';ctx.fillRect(0,H-36,W,36);
}
function drawStars(W,H){ctx.fillStyle='rgba(255,255,255,0.5)';[[28,16],[88,30],[195,11],[W-45,18],[W-18,36],[145,25],[W/2,8]].forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();});}
function drawSun(W,H,t){ol(()=>{ctx.beginPath();ctx.arc(W-36,25+t*5,18,0,Math.PI*2);},'#EF9F27','#BA7517',2);hl(W-42,22,7,5,-0.4);}
function drawMoon(W,H){ctx.fillStyle='#d0d8f0';ctx.beginPath();ctx.arc(W-36,28,14,0,Math.PI*2);ctx.fill();ctx.fillStyle='#162540';ctx.beginPath();ctx.arc(W-30,22,11,0,Math.PI*2);ctx.fill();}
function drawRain(W,H){ctx.strokeStyle='rgba(150,180,255,0.4)';ctx.lineWidth=1.2;for(let i=0;i<20;i++){const x=(S.frame*4+i*41)%W,y=(S.frame*5+i*57)%H;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-9,y+20);ctx.stroke();}}

  else if(s===1){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-58);ctx.stroke();ctx.strokeStyle='#3b6d11';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-58);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx-22,base-46,24,12,-0.5,0,Math.PI*2);},'#97C459');hl(cx-26,base-50,8,4,-0.5);ol(()=>{ctx.beginPath();ctx.ellipse(cx+22,base-40,24,12,0.5,0,Math.PI*2);},'#97C459');hl(cx+18,base-44,8,4,0.5);}
  else if(s===2){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-75);ctx.stroke();ctx.strokeStyle='#3b6d11';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-75);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx-24,base-58,26,13,-0.5,0,Math.PI*2);},'#97C459');hl(cx-28,base-62,9,4,-0.5);ol(()=>{ctx.beginPath();ctx.ellipse(cx+24,base-52,26,13,0.5,0,Math.PI*2);},'#97C459');hl(cx+20,base-56,9,4,0.5);ol(()=>{ctx.beginPath();ctx.ellipse(cx,base-87,10,14,0,0,Math.PI*2);},'#F4C0D1');ol(()=>{ctx.beginPath();ctx.ellipse(cx-8,base-83,8,12,0.5,0,Math.PI*2);},'#ED93B1');ol(()=>{ctx.beginPath();ctx.ellipse(cx+8,base-83,8,12,-0.5,0,Math.PI*2);},'#ED93B1');}
  else if(s===3){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=6;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.bezierCurveTo(cx-4,base-40,cx+4,base-65,cx,base-95);ctx.stroke();ctx.strokeStyle='#3b6d11';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(cx,base);ctx.bezierCurveTo(cx-4,base-40,cx+4,base-65,cx,base-95);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx-28,base-68,28,13,-0.5,0,Math.PI*2);},'#97C459');hl(cx-32,base-72,10,5,-0.5);ol(()=>{ctx.beginPath();ctx.ellipse(cx+28,base-62,28,13,0.5,0,Math.PI*2);},'#97C459');hl(cx+24,base-66,10,5,0.5);for(let i=0;i<5;i++){const a=i/5*Math.PI*2-Math.PI/2;ol(()=>{ctx.beginPath();ctx.ellipse(cx+Math.cos(a)*20,base-100+Math.sin(a)*20,15,9,a,0,Math.PI*2);},'#F4C0D1');}for(let i=0;i<5;i++){const a=i/5*Math.PI*2-Math.PI/2;hl(cx+Math.cos(a)*16,base-100+Math.sin(a)*16,5,3,a);}ol(()=>{ctx.beginPath();ctx.arc(cx,base-100,10,0,Math.PI*2);},'#FAC775');hl(cx-3,base-104,4,3);}
  else if(s===4){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx-8,base-55);ctx.stroke();ctx.strokeStyle='#8a7040';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx-8,base-55);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx-20,base-48,18,9,-0.6,0,Math.PI*2);},'#b8a060');ol(()=>{ctx.beginPath();ctx.ellipse(cx+8,base-44,16,8,0.4,0,Math.PI*2);},'#b8a060');ol(()=>{ctx.beginPath();ctx.arc(cx-8,base-66,12,0,Math.PI*2);},'#c8a060');}
  else if(s===5){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-38);ctx.stroke();ctx.strokeStyle='#8a7040';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-38);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx,base-48,14,11,0,0,Math.PI*2);},'#BA7517');hl(cx-4,base-52,5,3.5);ctx.strokeStyle='#FAC775';ctx.lineWidth=2;for(let i=0;i<6;i++){const a=i/6*Math.PI*2;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*17,base-48+Math.sin(a)*12);ctx.lineTo(cx+Math.cos(a)*23,base-48+Math.sin(a)*17);ctx.stroke();}}
  ctx.restore();
}

function drawMan(W,H){
  const base=H-36,cx=W/2;
  if(S.showSleep||S.sleeping){return;}
  if(S.showSing){return;}
  if(S.typhoonActive){drawBody(cx-52,base,'support',cx);return;}
  if(S.cutType===1){drawBody(cx+55,base,'water');return;}
  if(S.cutType===3){drawBody(cx+55,base,'dance');return;}
  drawBody(cx-54,base,'stand');
}

    ctx.beginPath();ctx.arc(sx,base-52,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(sx-3,base-56,5,3,-0.4);
    ctx.beginPath();ctx.moveTo(sx,base-41);ctx.lineTo(sx,base-18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(cx2-2,base-75);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx-12,base-26);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx-10,base-2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx+10,base-2);ctx.stroke();
  } else if(type==='water'){
    ctx.beginPath();ctx.arc(sx,base-52,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(sx-3,base-56,5,3,-0.4);

    ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx-10,base-2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx+10,base-2);ctx.stroke();
    ctx.strokeStyle='#85B7EB';ctx.lineWidth=2;for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(sx-24+i*5,base-22);ctx.lineTo(sx-26+i*5,base-12);ctx.stroke();}

    ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx-10,base-2);ctx.stroke();

function drawBird(W,H){
  if(!S.birdActive)return;
  const bx=S.birdX,by=S.birdY,wb=Math.sin(S.frame*0.2)*7;
  const flip=S.birdVx>0;
  ctx.save();if(flip){ctx.translate(bx*2,0);ctx.scale(-1,1);}
  ol(()=>{ctx.beginPath();ctx.ellipse(bx,by,22,16,0.15,0,Math.PI*2);},'#F4C0D1','#993556',3);hl(bx-6,by-8,7,4,-0.3);
  ol(()=>{ctx.beginPath();ctx.ellipse(bx-6,by-8+wb,16,9,-0.5,0,Math.PI*2);},'#ED93B1','#993556',2);hl(bx-10,by-12+wb,5,3,-0.5);
  ol(()=>{ctx.beginPath();ctx.ellipse(bx+12,by-10,10,9,0.2,0,Math.PI*2);},'#F4C0D1','#993556',3);hl(bx+8,by-15,4,3,-0.3);
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(bx+16,by-12,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bx+15,by-13,1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FAEEDA';ctx.strokeStyle='#BA7517';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(bx+21,by-10);ctx.lineTo(bx+30,by-8);ctx.lineTo(bx+21,by-6);ctx.closePath();ctx.fill();ctx.stroke();
  // HPが減ったら赤く点滅
  if(S.birdHp<3&&S.frame%10<5){ctx.save();ctx.globalAlpha=0.3;ctx.fillStyle='#ff0000';ctx.beginPath();ctx.ellipse(bx,by,24,18,0,0,Math.PI*2);ctx.fill();ctx.restore();}
  ctx.restore();
}

let frame=0;
function tick(){
  frame++;S.frame=frame;
  S.dayTime=(S.dayTime+0.0004)%1;
  if(S.birdWarnTimer>0){S.birdWarnTimer--;if(S.birdWarnTimer===0&&S.birdWarn){S.birdWarn=false;ov('ovBirdWarn').style.display='none';S.birdActive=true;ov('evBird').style.display='block';ov('hpw').style.display='block';sm('🐦 鳥を直接タップして追い払え！');}}
  if(S.birdActive){S.birdX+=S.birdVx;if(S.birdX<cv.width/2-20)S.birdVx=1.8;if(S.birdX>cv.width+60){S.birdActive=false;ov('evBird').style.display='none';ov('hpw').style.display='none';S.love=Math.max(0,S.love-15);ui();sm('鳥に荒らされた…棒人間がしょんぼりしてる');}}
  if(S.bird2Timer>0){S.bird2Timer--;if(S.bird2Timer===0&&S.bird2Step===1){S.bird2Step=2;ov('ovBird2_1').style.display='none';ov('ovBird2_2').style.display='flex';sm('…ただ見てただけみたい。よかった😮‍💨');setTimeout(()=>{S.bird2Step=0;ov('ovBird2_2').style.display='none';sm('びっくりした…');},2000);}}
  if(S.typhoonTimer>0){S.typhoonTimer--;if(S.typhoonTimer===0){S.typhoonActive=false;ov('evTyphoon').style.display='none';ov('ovTyphoon').style.display='none';ov('typhoon-arrow').style.display='none';if(!S.supported){S.love=Math.max(0,S.love-20);ui();sm('台風に耐えた…でも少しダメージを受けた');}else sm('棒人間が踏ん張った！お花は無事だった！');S.supported=false;}}
  if(S.sleepTimer>0){S.sleepTimer--;if(S.sleepTimer===0)S.sleeping=false;}
  if(S.sleepImgTimer>0){S.sleepImgTimer--;if(S.sleepImgTimer===0){S.showSleep=false;ov('ovSleep').style.display='none';}}
  if(S.bloomTimer>0){S.bloomTimer--;if(S.bloomTimer===0){ov('ovBloom').style.display='none';S.showBloom=false;}}
  if(S.cryTimer>0){S.cryTimer--;if(S.cryTimer===0){ov('ovCry').style.display='none';S.showCry=false;}}
  if(S.singTimer>0){S.singTimer--;if(S.singTimer===0){S.showSing=false;ov('ovSing').style.display='none';}}
  if(S.monoTimer>0){S.monoTimer--;if(S.monoTimer===0){S.showMono=false;ov('monologue').style.display='none';}}
  if(S.witherTimer>0){S.witherTimer--;if(S.witherTimer===0)wither();}
  if(frame%300===0&&!S.sleeping&&!S.birdActive&&!S.typhoonActive&&S.stage<4&&!S.mgActive){S.cutType=Math.floor(Math.random()*4);}
  if(frame%220===0&&S.stage<4){S.water=Math.max(0,S.water-4);S.sun=Math.max(0,S.sun-3);ui();}
  if(S.showSing)ov('ovSing').style.display='flex';
  maybeEvent();
  const W=cv.width,H=cv.height;
  drawBg(W,H);drawPlant(W,H);drawMan(W,H);drawBird(W,H);
  requestAnimationFrame(tick);
}

function startGame(){resize();tick();}
</script>
