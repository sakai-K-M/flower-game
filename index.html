<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>これは、植物とともに暮らす</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:#0a0a0a;display:flex;justify-content:center;min-height:100vh;}
.wrap{width:100%;max-width:390px;font-family:sans-serif;background:#fff;position:relative;}
#titleScreen{position:fixed;inset:0;z-index:100;cursor:pointer;background:#0a0a14;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#titleScreen .timg{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;opacity:0.85;}
#titleScreen .ttext{position:relative;z-index:2;text-align:center;padding:24px;}
#titleScreen h1{font-size:20px;color:#fff;letter-spacing:4px;text-shadow:0 0 20px rgba(255,192,203,0.9);margin-bottom:10px;line-height:1.6;}
#titleScreen h2{font-size:13px;color:#ffcce0;letter-spacing:3px;}
#tapHint{position:absolute;bottom:40px;z-index:3;color:rgba(255,255,255,0.6);font-size:12px;animation:bl 1.5s infinite;}
@keyframes bl{0%,100%{opacity:0.2;}50%{opacity:1;}}
.topbar{background:#f5f5f5;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;}
.stglabel{font-size:13px;color:#888;}.stgname{font-size:14px;font-weight:500;color:#333;}
.scene{height:240px;position:relative;overflow:hidden;cursor:pointer;touch-action:none;}
canvas{position:absolute;inset:0;width:100%;height:100%;}
.ov{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:20;gap:8px;}
.ov.dk{background:rgba(0,0,0,0.65);}
.ov.pk{background:rgba(255,220,230,0.6);}
.ov img{max-width:75%;max-height:72%;object-fit:contain;border-radius:10px;}
.ov-lbl{font-size:12px;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,0.9);text-align:center;padding:0 12px;line-height:1.5;}
#balloon{position:absolute;left:8%;bottom:95px;z-index:18;display:none;max-width:65%;animation:popIn 0.25s ease;}
@keyframes popIn{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}
#balloon-inner{background:#fff;border:2px solid #333;border-radius:14px;padding:8px 12px;font-size:11px;color:#333;line-height:1.5;position:relative;}
#balloon-inner::after{content:'';position:absolute;bottom:-10px;left:18px;border:5px solid transparent;border-top-color:#333;}
#balloon-inner::before{content:'';position:absolute;bottom:-7px;left:19px;border:4px solid transparent;border-top-color:#fff;z-index:1;}
#ovMushroom{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:19;background:rgba(0,0,0,0.6);gap:8px;}
#ovMushroom img{max-width:70%;max-height:70%;object-fit:contain;border-radius:10px;}
#ovMushroom .ov-lbl{font-size:12px;color:#fff;text-align:center;padding:0 12px;}
#minigame{position:absolute;inset:0;background:rgba(0,0,0,0.78);z-index:25;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:20px;}
#mg-title{font-size:15px;color:#fff;font-weight:500;}
#mg-inst{font-size:12px;color:#ddd;text-align:center;line-height:1.6;}
#mg-track{width:85%;height:24px;background:rgba(255,255,255,0.15);border-radius:12px;position:relative;overflow:hidden;margin:4px 0;}
#mg-green{position:absolute;top:0;height:100%;background:rgba(100,220,100,0.5);border-radius:12px;}
#mg-needle{position:absolute;top:0;width:4px;height:100%;background:#fff;border-radius:2px;}
#mg-speed-lbl{font-size:11px;color:rgba(255,255,255,0.6);margin-top:-4px;}
#leaf-area{width:90%;height:100px;position:relative;background:rgba(255,255,255,0.05);border-radius:12px;overflow:hidden;margin:4px 0;}
.leaf-item{position:absolute;font-size:22px;cursor:pointer;user-select:none;transition:transform 0.1s,opacity 0.1s;}
#mg-tap-btn{background:rgba(255,255,255,0.15);border:2px solid rgba(255,255,255,0.5);border-radius:50%;width:72px;height:72px;font-size:26px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;}
#mg-tap-btn.love{background:rgba(237,147,177,0.3);border-color:#ED93B1;width:82px;height:82px;font-size:30px;}
#mg-result{font-size:18px;color:#fff;font-weight:500;display:none;}
#love-count{font-size:13px;color:#ED93B1;display:none;}
#leaf-count{font-size:13px;color:#97C459;display:none;}
.hpw{position:absolute;bottom:6px;left:16px;right:16px;height:7px;background:rgba(0,0,0,0.3);border-radius:4px;display:none;z-index:15;overflow:hidden;}
.hpf{height:100%;background:#E24B4A;border-radius:4px;transition:width 0.2s;}
.evb{position:absolute;top:6px;left:12px;right:12px;text-align:center;font-size:12px;font-weight:500;color:#fff;padding:5px 8px;border-radius:8px;display:none;z-index:15;}
.evb.bi{background:rgba(180,50,50,0.9);}.evb.ty{background:rgba(30,70,200,0.9);}
#ty-arrow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:40px;color:#fff;text-shadow:0 0 12px #fff;display:none;z-index:16;pointer-events:none;animation:pulse 0.6s infinite alternate;}
@keyframes pulse{from{opacity:0.5;font-size:36px;}to{opacity:1;font-size:44px;}}
.msg{background:#f5f5f5;padding:10px 16px;font-size:13px;color:#333;min-height:42px;line-height:1.5;}
.gen{font-size:11px;color:#aaa;padding:2px 16px 6px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:6px 12px;}
.stat{background:#f5f5f5;border-radius:8px;padding:8px;}
.slbl{font-size:11px;color:#888;margin-bottom:5px;}
.sb{height:5px;border-radius:3px;background:#e0e0e0;overflow:hidden;}
.sf{height:100%;border-radius:3px;transition:width 0.4s;}
.sf.w{background:#85B7EB;}.sf.s{background:#EF9F27;}.sf.l{background:#ED93B1;}
.acts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 12px 16px;}
button.ab{background:#f5f5f5;border:1px solid #ddd;border-radius:10px;padding:10px 4px;cursor:pointer;font-size:11px;color:#333;font-family:sans-serif;}
button.ab:active{transform:scale(0.94);}
.ic{font-size:20px;display:block;margin-bottom:3px;}
.pbw{height:3px;background:#e0e0e0;}.pbf{height:100%;background:#ED93B1;transition:width 0.6s;}
</style>
</head>

let leafInterval=null,leafEndTimeout=null;
function startLeafGame(){
  if(S.mgActive)return;
  S.mgActive=true;S.mgType='sun';S.leafCleared=0;S.leafTotal=8;
  el('mg-title').textContent='☀️ ひなたへ！';
  el('mg-inst').textContent='落ち葉をタップして払おう！';
  el('mg-speed-lbl').textContent='';

  el('love-count').style.display='none';el('mg-result').style.display='none';
  el('leaf-area').style.display='block';el('leaf-area').innerHTML='';
  el('leaf-count').style.display='block';el('leaf-count').textContent='払った葉: 0 / '+S.leafTotal;
  el('minigame').style.display='flex';
  const leaves=['🍂','🍁','🍃','🌿'];
  let spawned=0;
  if(leafInterval)clearInterval(leafInterval);
  leafInterval=setInterval(()=>{
    if(spawned>=S.leafTotal){clearInterval(leafInterval);return;}
    spawned++;
    const leaf=document.createElement('div');
    leaf.className='leaf-item';
    leaf.textContent=leaves[Math.floor(Math.random()*leaves.length)];
    leaf.style.left=Math.random()*80+'%';
    leaf.style.top=Math.random()*70+'%';
    leaf.addEventListener('click',()=>{
      if(!S.mgActive)return;
      leaf.style.transform='scale(0)';leaf.style.opacity='0';
      S.leafCleared++;
      el('leaf-count').textContent='払った葉: '+S.leafCleared+' / '+S.leafTotal;
      setTimeout(()=>leaf.remove(),150);
      if(S.leafCleared>=S.leafTotal)finishLeaf();
    });
    el('leaf-area').appendChild(leaf);
  },400);
  if(leafEndTimeout)clearTimeout(leafEndTimeout);
  leafEndTimeout=setTimeout(()=>{if(S.mgActive&&S.mgType==='sun')finishLeaf();},7000);
}
function finishLeaf(){
  if(!S.mgActive)return;
  S.mgActive=false;if(leafInterval)clearInterval(leafInterval);if(leafEndTimeout)clearTimeout(leafEndTimeout);
  let result=S.leafCleared>=S.leafTotal?'great':S.leafCleared>=5?'success':'fail';
  el('leaf-area').innerHTML='';el('leaf-area').style.display='none';
  el('mg-track').style.display='block';el('mg-tap-btn').style.display='flex';el('leaf-count').style.display='none';
  const res=el('mg-result');res.style.display='block';
  res.textContent=result==='great'?'🌟 全部払った！':result==='success'?'✨ まあまあ払えた！':'😅 葉っぱが残っちゃった…';
  setTimeout(()=>{el('minigame').style.display='none';applyResult('sun',result);},800);
}

// ---- 針ゲーム（水やり・ランダム速度） ----
let mgInterval=null;
function startMg(type){
  if(S.mgActive)return;
  if(type==='sun'){startLeafGame();return;}
  S.mgActive=true;S.mgType=type;S.mgPos=50;S.mgDir=1;
  el('mg-result').style.display='none';el('love-count').style.display='none';
  el('leaf-area').style.display='none';el('leaf-count').style.display='none';
  el('mg-track').style.display='block';el('mg-tap-btn').style.display='flex';
  el('minigame').style.display='flex';
  const btn=el('mg-tap-btn');
  if(type==='water'){
    // ランダム速度
    const speeds=[0.8,1.2,1.8,2.8];
    const si=Math.floor(Math.random()*speeds.length);
    S.mgSpeed=speeds[si];
    el('mg-title').textContent='💧 水やり！';
    el('mg-speed-lbl').textContent=SPEED_LABELS[si];
    el('mg-inst').textContent='針が緑ゾーンに入ったらタップ！';
    btn.textContent='💧';btn.className='';
    el('mg-green').style.left='35%';el('mg-green').style.width='30%';
    if(mgInterval)clearInterval(mgInterval);
    mgInterval=setInterval(()=>{
      if(!S.mgActive){clearInterval(mgInterval);return;}
      S.mgPos+=S.mgDir*S.mgSpeed;
      if(S.mgPos>=98)S.mgDir=-1;if(S.mgPos<=2)S.mgDir=1;
      el('mg-needle').style.left=S.mgPos+'%';
    },30);
  } else if(type==='love'){
    el('mg-title').textContent='🎵 うたう！';
    el('mg-speed-lbl').textContent='';
    el('mg-inst').textContent='5秒間ひたすらタップ！';
    btn.textContent='🎵';btn.className='love';
    el('mg-green').style.left='0%';el('mg-green').style.width='0%';
    el('mg-needle').style.left='0%';
    S.loveTap=0;el('love-count').style.display='block';el('love-count').textContent='タップ数: 0';
    setTimeout(finishMg,5000);
  }
}
function mgTap(){
  if(!S.mgActive)return;
  if(S.mgType==='love'){S.loveTap++;el('love-count').textContent='タップ数: '+S.loveTap;el('mg-needle').style.left=Math.min(100,S.loveTap*5)+'%';return;}
  if(S.mgType==='water'){if(mgInterval)clearInterval(mgInterval);finishMg();}
}
function finishMg(){
  if(!S.mgActive)return;S.mgActive=false;if(mgInterval)clearInterval(mgInterval);
  let result='fail';
  if(S.mgType==='love'){result=S.loveTap>=15?'great':S.loveTap>=8?'success':'fail';}
  else{const gl=parseFloat(el('mg-green').style.left),gr=gl+parseFloat(el('mg-green').style.width);if(S.mgPos>=gl&&S.mgPos<=gr){result=Math.abs(S.mgPos-(gl+gr)/2)<5?'great':'success';}}
  const res=el('mg-result');res.style.display='block';
  res.textContent=result==='great'?'🌟 大成功！':result==='success'?'✨ 成功！':'😅 失敗…';
  setTimeout(()=>{el('minigame').style.display='none';applyResult(S.mgType,result);if(S.mgType==='love'){show('ovSing');S.showSing=true;S.singTimer=80;}},800);
}

const rMsg={water:{great:'じょうろが完璧に決まった！お花が喜んでる🌱',success:'上手に水やりできた😊',fail:'あれ、タイミングがずれた…💧'},sun:{great:'落ち葉を全部払った！日光サンサン☀️',success:'だいたい払えた！まあいいか',fail:'落ち葉が残っちゃった…お花が少し暗い😓'},love:{great:'最高の歌声！お花が大きく揺れた🎵',success:'いい感じに歌えた♪',fail:'ちょっと声が出なかった…'}};
const rBonus={great:{w:28,s:20,l:25},success:{w:16,s:12,l:14},fail:{w:6,s:4,l:4}};
function applyResult(type,result){
  const b=rBonus[result];
  if(type==='water'){S.water=Math.min(100,S.water+b.w);S.love=Math.min(100,S.love+3);}
  else if(type==='sun'){S.sun=Math.min(100,S.sun+b.s);}
  else if(type==='love'){S.love=Math.min(100,S.love+b.l);S.sun=Math.min(100,S.sun+3);}
  sm(rMsg[type][result]);checkGrowth();ui();
}

function doAct(t){
  if(S.birdActive||S.birdWarn||S.bird2Step>0){sm('まず鳥をなんとかして！');return;}
  if(S.typhoonActive){sm('台風中！スワイプで支えて！');return;}
  if(S.stage>=4){sm('今は種を見つけるのを待って…');return;}
  if(S.mgActive)return;
  if(t==='rest'){S.sleeping=true;S.sleepTimer=160;S.showSleep=true;S.sleepTimer2=100;S.love=Math.min(100,S.love+10);show('ovSleep');sm('芽の横でごろんと昼寝した');checkGrowth();ui();}
  else startMg(t);
}

function checkGrowth(){
  if(S.stage>=3)return;
  const avg=(S.water+S.sun+S.love)/3;
  S.growth=Math.min(399.9,S.growth+(avg>50?6.0:1.5));
  if(S.growth>=300&&S.stage<3){S.stage=3;S.showBloom=true;S.bloomTimer=300;S.witherTimer=700;sm('🌸 まんかい！棒人間が飛び上がって喜んだ！');show('ovBloom');saveGame();}
  else if(S.growth>=200&&S.stage<2)S.stage=2;
  else if(S.growth>=48&&S.stage<1)S.stage=1;
  ui();
}

function wither(){S.stage=4;S.showCry=true;S.cryTimer=250;ui();show('ovCry');sm('お花が散っていく…でも綺麗だった');setTimeout(()=>{S.stage=5;ui();sm('枯れた花の中に種を見つけた！タップして次の代を植えよう🌰');},5000);}
function newGen(){S.gen++;S.water=60;S.sun=60;S.love=60;S.growth=0;S.stage=0;S.witherTimer=0;S.birdActive=false;S.birdWarn=false;S.bird2Step=0;S.typhoonActive=false;hideAllOv();ui();S.showSeedWait=true;S.seedWaitTimer=150;show('ovSeedWait');sm(S.gen+'代目の種を植えた。わくわく待機中…🌱');saveGame();}

function maybeEvent(){
  // 鳥・台風イベント（独立判定）
  if(!S.birdActive&&!S.birdWarn&&S.bird2Step===0&&!S.typhoonActive&&S.stage>=1&&S.stage<4&&!S.mgActive){
    const r=Math.random();
    if(r<0.0018){
      if(Math.random()<0.5){
        S.birdWarn=true;S.birdWarnTimer=90;S.birdHp=10;
        S.birdX=cv.width+40;S.birdY=30+Math.random()*30;S.birdVx=-2;S.birdVy=(Math.random()-0.5)*2;
        show('ovBird1w');sm('なんか来る気がする…！タップして！');
      } else {
        S.bird2Step=1;S.bird2AutoTimer=300;show('ovBird2a');sm('なんか来た…タップして！');
      }
    } else if(r<0.003){
      S.typhoonActive=true;S.supported=false;S.typhoonTimer=360;S.typhoonDir=Math.random()<0.5?1:-1;
      show('ovTyphoon');show('evTy');el('ty-arrow').style.display='block';el('ty-arrow').textContent=S.typhoonDir>0?'👉':'👈';
      sm('🌀 台風！'+(S.typhoonDir>0?'右':'左')+'にスワイプして支えて！');
    }
  }
  // 独り言（独立判定）
  if(!S.showMono&&!S.showMushroom&&S.stage>=1&&S.monoCooldown===0&&!S.mgActive&&!S.birdActive&&!S.birdWarn&&!S.bird2Step&&!S.typhoonActive){
    S.monoCooldown=Math.floor(Math.random()*(900-480)+480);
    if(Math.random()<0.15){
      S.showMushroom=true;S.mushroomTimer=Math.floor(Math.random()*(900-480)+480);
      el('ovMushroom').style.display='flex';
      sm(MUSHROOM_LINE);
    } else {
      S.showMono=true;S.monoTimer=Math.floor(Math.random()*(900-480)+480);
      const txt=MONOLOGUES[Math.floor(Math.random()*MONOLOGUES.length)];
      showBalloon(txt);sm('…');
    }
  }
}

scene.addEventListener('touchstart',e=>{S.swipeStartX=e.touches[0].clientX;handleTap(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
scene.addEventListener('click',e=>handleTap(e.clientX,e.clientY));
scene.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-S.swipeStartX;if(Math.abs(dx)>30)handleSwipe(dx);},{passive:true});

function handleTap(cx,cy){
  if(S.mgActive)return;
  if(S.birdWarn){S.birdWarn=false;S.birdWarnTimer=0;hide('ovBird1w');S.birdActive=true;S.birdHp=10;show('ovBird1a');show('evBird');show('hpw');el('hpf').style.width='100%';el('birdLeft').textContent='10';sm('🐦 鳥を直接タップして追い払え！');return;}
  if(S.birdActive){
    hide('ovBird1a');
    const rect=scene.getBoundingClientRect();
    const tx=(cx-rect.left)/rect.width*cv.width;
    const ty=(cy-rect.top)/rect.height*cv.height;
    if(Math.sqrt((tx-S.birdX)**2+(ty-S.birdY)**2)<50){
      S.birdHp--;
      el('hpf').style.width=(S.birdHp/10*100)+'%';
      el('birdLeft').textContent=S.birdHp;
      if(S.birdHp<=0){S.birdActive=false;S.birdEscTimer=0;hide('evBird');hide('hpw');S.love=Math.min(100,S.love+18);ui();sm('棒人間が鳥を追い払った！お花は無事！');}
      else sm('もう'+S.birdHp+'回当てて！');
    } else sm('外れた！鳥をよく狙って！');
    return;
  }
  if(S.bird2Step===1){S.bird2Step=2;S.bird2TapDelay=80;S.bird2AutoTimer=0;hide('ovBird2a');show('ovBird2b');sm('…ただ見てただけみたい。よかった😮‍💨');return;}
  if(S.bird2Step===2){if(S.bird2TapDelay>0){return;}S.bird2Step=0;S.bird2TapDelay=0;hide('ovBird2b');sm('びっくりした…');return;}
  if(S.typhoonActive)return;
  if(S.showMushroom){el('ovMushroom').style.display='none';S.showMushroom=false;S.mushroomTimer=0;return;}
  if(S.showBloom){hide('ovBloom');S.showBloom=false;return;}
  if(S.showCry){hide('ovCry');S.showCry=false;return;}
  if(S.showSeedWait){hide('ovSeedWait');S.showSeedWait=false;return;}
  if(S.stage===5)newGen();
}

function handleSwipe(dx){if(S.typhoonActive){const ok=(S.typhoonDir>0&&dx>30)||(S.typhoonDir<0&&dx<-30);if(ok){S.supported=true;S.love=Math.min(100,S.love+8);ui();sm('棒人間が踏ん張った！がんばれ！');}else sm('逆！'+(S.typhoonDir>0?'右':'左')+'にスワイプ！');}}

function resize(){cv.width=scene.offsetWidth;cv.height=scene.offsetHeight;}
resize();window.addEventListener('resize',resize);
function ol(fn,fc,sc,lw){ctx.save();ctx.lineJoin='round';ctx.lineCap='round';ctx.strokeStyle=sc||'#1a1a1a';ctx.lineWidth=lw||3;fn();ctx.stroke();ctx.fillStyle=fc;fn();ctx.fill();ctx.restore();}
function hl(x,y,rx,ry,a){ctx.save();ctx.globalAlpha=0.38;ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(x,y,rx,ry,a||0,0,Math.PI*2);ctx.fill();ctx.restore();}

function drawBg(W,H){
  const d=S.dayTime,t=d<0.5?d/0.5:1-(d-0.5)/0.5;
  if(S.typhoonActive){ctx.fillStyle='#1a2040';ctx.fillRect(0,0,W,H);drawRain(W,H);}
  else{const g=ctx.createLinearGradient(0,0,0,H);g.addColorStop(0,`rgb(${Math.round(13+t*122)},${Math.round(27+t*179)},${Math.round(42+t*193)})`);g.addColorStop(1,`rgb(${Math.round(17+t*83)},${Math.round(32+t*148)},${Math.round(26+t*94)})`);ctx.fillStyle=g;ctx.fillRect(0,0,W,H);if(d<0.2||d>0.85){drawStars(W,H);drawMoon(W,H);}else drawSun(W,H,t);}
  ctx.fillStyle='#3b6d11';ctx.fillRect(0,H-46,W,10);ctx.fillStyle='#5c3d2e';ctx.fillRect(0,H-36,W,36);
}
function drawStars(W,H){ctx.fillStyle='rgba(255,255,255,0.5)';[[28,16],[88,30],[195,11],[W-45,18],[W-18,36],[145,25],[W/2,8]].forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();});}
function drawSun(W,H,t){ol(()=>{ctx.beginPath();ctx.arc(W-36,25+t*5,18,0,Math.PI*2);},'#EF9F27','#BA7517',2);hl(W-42,22,7,5,-0.4);}
function drawMoon(W,H){ctx.fillStyle='#d0d8f0';ctx.beginPath();ctx.arc(W-36,28,14,0,Math.PI*2);ctx.fill();ctx.fillStyle='#162540';ctx.beginPath();ctx.arc(W-30,22,11,0,Math.PI*2);ctx.fill();}
function drawRain(W,H){ctx.strokeStyle='rgba(150,180,255,0.4)';ctx.lineWidth=1.2;for(let i=0;i<20;i++){const x=(S.frame*4+i*41)%W,y=(S.frame*5+i*57)%H;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-9,y+20);ctx.stroke();}}

function drawPlant(W,H){
  const cx=W/2,base=H-36,s=S.stage,tilt=S.typhoonActive&&!S.supported?Math.sin(S.frame*0.12)*0.22:0;
  ctx.save();ctx.translate(cx,base);ctx.rotate(tilt);ctx.translate(-cx,-base);
  if(s===0){ol(()=>{ctx.beginPath();ctx.ellipse(cx,base-10,12,8,0,0,Math.PI*2);},'#BA7517');ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base-16);ctx.lineTo(cx,base-26);ctx.stroke();}
  else if(s===1){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-58);ctx.stroke();ctx.strokeStyle='#3b6d11';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-58);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx-22,base-46,24,12,-0.5,0,Math.PI*2);},'#97C459');hl(cx-26,base-50,8,4,-0.5);ol(()=>{ctx.beginPath();ctx.ellipse(cx+22,base-40,24,12,0.5,0,Math.PI*2);},'#97C459');hl(cx+18,base-44,8,4,0.5);}
  else if(s===2){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-75);ctx.stroke();ctx.strokeStyle='#3b6d11';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-75);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx-24,base-58,26,13,-0.5,0,Math.PI*2);},'#97C459');hl(cx-28,base-62,9,4,-0.5);ol(()=>{ctx.beginPath();ctx.ellipse(cx+24,base-52,26,13,0.5,0,Math.PI*2);},'#97C459');hl(cx+20,base-56,9,4,0.5);ol(()=>{ctx.beginPath();ctx.ellipse(cx,base-87,10,14,0,0,Math.PI*2);},'#F4C0D1');ol(()=>{ctx.beginPath();ctx.ellipse(cx-8,base-83,8,12,0.5,0,Math.PI*2);},'#ED93B1');ol(()=>{ctx.beginPath();ctx.ellipse(cx+8,base-83,8,12,-0.5,0,Math.PI*2);},'#ED93B1');}
  else if(s===3){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=6;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.bezierCurveTo(cx-4,base-40,cx+4,base-65,cx,base-95);ctx.stroke();ctx.strokeStyle='#3b6d11';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(cx,base);ctx.bezierCurveTo(cx-4,base-40,cx+4,base-65,cx,base-95);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx-28,base-68,28,13,-0.5,0,Math.PI*2);},'#97C459');hl(cx-32,base-72,10,5,-0.5);ol(()=>{ctx.beginPath();ctx.ellipse(cx+28,base-62,28,13,0.5,0,Math.PI*2);},'#97C459');hl(cx+24,base-66,10,5,0.5);for(let i=0;i<5;i++){const a=i/5*Math.PI*2-Math.PI/2;ol(()=>{ctx.beginPath();ctx.ellipse(cx+Math.cos(a)*20,base-100+Math.sin(a)*20,15,9,a,0,Math.PI*2);},'#F4C0D1');}for(let i=0;i<5;i++){const a=i/5*Math.PI*2-Math.PI/2;hl(cx+Math.cos(a)*16,base-100+Math.sin(a)*16,5,3,a);}ol(()=>{ctx.beginPath();ctx.arc(cx,base-100,10,0,Math.PI*2);},'#FAC775');hl(cx-3,base-104,4,3);}
  else if(s===4){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx-8,base-55);ctx.stroke();ctx.strokeStyle='#8a7040';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx-8,base-55);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx-20,base-48,18,9,-0.6,0,Math.PI*2);},'#b8a060');ol(()=>{ctx.beginPath();ctx.ellipse(cx+8,base-44,16,8,0.4,0,Math.PI*2);},'#b8a060');ol(()=>{ctx.beginPath();ctx.arc(cx-8,base-66,12,0,Math.PI*2);},'#c8a060');}
  else if(s===5){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-38);ctx.stroke();ctx.strokeStyle='#8a7040';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-38);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx,base-48,14,11,0,0,Math.PI*2);},'#BA7517');hl(cx-4,base-52,5,3.5);ctx.strokeStyle='#FAC775';ctx.lineWidth=2;for(let i=0;i<6;i++){const a=i/6*Math.PI*2;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*17,base-48+Math.sin(a)*12);ctx.lineTo(cx+Math.cos(a)*23,base-48+Math.sin(a)*17);ctx.stroke();}}
  ctx.restore();
}

function drawMan(W,H){
  const base=H-36,cx=W/2;
  if(S.showSleep||S.sleeping||S.showSeedWait||S.showSing)return;
  if(S.typhoonActive){drawBody(cx-52,base,'support',cx);return;}
  // 友人
  if(S.friendPhase>0){
    drawBody(cx-54,base,'stand');
    drawFriend(W,H);
    return;
  }
  if(S.cutType===1){drawBody(cx+55,base,'water');return;}
  if(S.cutType===3){drawBody(cx+55,base,'dance');return;}
  if(S.cutType===4&&S.climbTimer>0){drawBody(cx-10,base-30,'climb',0,cx);return;}
  if(S.cutType===5&&S.skipTimer>0){drawSkip(cx-40,base);return;}
  if(S.cutType===6&&S.ponderTimer>0){drawPonder(cx-54,base);return;}
  if(S.cutType===7&&S.radioTimer>0){drawRadio(cx-54,base);return;}
  if(S.cutType===8&&S.surpriseTimer>0){drawSurprise(cx-54,base);return;}
  drawBody(cx-54,base,'stand');
}

function drawFriend(W,H){
  const base=H-36;
  // 友人が右から歩いてくる
  const fx=S.friendX;
  if(S.friendPhase===1){
    // 歩いてる
    drawFriendBody(fx,base,true);
  } else if(S.friendPhase===2){
    // 話し中（吹き出し）
    drawFriendBody(fx,base,false);
  } else if(S.friendPhase===3){
    // 去っていく
    drawFriendBody(fx,base,true);
  }
}

function drawFriendBody(fx,base,walking){
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=3.5;ctx.lineCap='round';ctx.fillStyle='#f0f0f0';
  ctx.beginPath();ctx.arc(fx,base-48,10,0,Math.PI*2);ctx.fill();ctx.stroke();
  ctx.beginPath();ctx.moveTo(fx,base-38);ctx.lineTo(fx,base-18);ctx.stroke();
  if(walking){
    const wt=Math.sin(S.frame*0.2)*8;
    ctx.beginPath();ctx.moveTo(fx,base-33);ctx.lineTo(fx-12,base-22+wt);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx,base-33);ctx.lineTo(fx+12,base-22-wt);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx,base-18);ctx.lineTo(fx-9,base-2+wt*0.5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx,base-18);ctx.lineTo(fx+9,base-2-wt*0.5);ctx.stroke();
  } else {
    ctx.beginPath();ctx.moveTo(fx,base-33);ctx.lineTo(fx-14,base-25);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx,base-33);ctx.lineTo(fx+10,base-25);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx,base-18);ctx.lineTo(fx-9,base-3);ctx.stroke();
    ctx.beginPath();ctx.moveTo(fx,base-18);ctx.lineTo(fx+9,base-3);ctx.stroke();
    // 吹き出し
    ctx.fillStyle='#fff';ctx.strokeStyle='#333';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.rect(fx-30,base-72,60,18);ctx.fill();ctx.stroke();
    ctx.fillStyle='#333';ctx.font='9px sans-serif';ctx.textAlign='center';
    const lines=['なあなあ','さいきんどう？','それな〜','ほな〜'];
    ctx.fillText(lines[Math.floor(S.friendTimer/50)%lines.length],fx,base-59);
    ctx.textAlign='left';
  }
}

function drawSkip(sx,base){
  const t=S.frame*0.2;
  const jump=Math.abs(Math.sin(t))*18;
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=4;ctx.lineCap='round';ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(sx,base-52-jump,11,0,Math.PI*2);ctx.fill();ctx.stroke();
  hl(sx-3,base-56-jump,5,3,-0.4);
  ctx.beginPath();ctx.moveTo(sx,base-41-jump);ctx.lineTo(sx,base-18-jump*0.5);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,base-35-jump);ctx.lineTo(sx+16,base-26-jump*0.3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,base-35-jump);ctx.lineTo(sx-14,base-26-jump*0.3);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,base-18-jump*0.5);ctx.lineTo(sx-10,base-2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,base-18-jump*0.5);ctx.lineTo(sx+10,base-2);ctx.stroke();
  if(S.skipTimer>0){S.skipTimer--;}
  // コケる
  if(S.skipTimer===0&&S.cutType===5){
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.font='14px sans-serif';
    ctx.fillText('ズコッ',sx-10,base-60);
    sm('棒人間がスキップしてたらなぜかコケた😇');
  }
}

function drawPonder(sx,base){
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=4;ctx.lineCap='round';ctx.fillStyle='#fff';
  // 三角座り
  ctx.beginPath();ctx.arc(sx,base-38,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(sx-3,base-42,5,3,-0.4);
  ctx.beginPath();ctx.moveTo(sx,base-27);ctx.lineTo(sx,base-14);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx-14,base-24);ctx.lineTo(sx-18,base-8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx+14,base-24);ctx.lineTo(sx+18,base-8);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,base-14);ctx.lineTo(sx-16,base-2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,base-14);ctx.lineTo(sx+16,base-2);ctx.stroke();
  // 黄昏感
  if(S.frame%60<30){
    ctx.fillStyle='rgba(255,255,255,0.6)';ctx.font='10px sans-serif';
    ctx.fillText('…',sx+15,base-42);
  }
}

function drawRadio(sx,base){
  const t=S.frame*0.15;
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=4;ctx.lineCap='round';ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(sx,base-52,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(sx-3,base-56,5,3,-0.4);
  ctx.beginPath();ctx.moveTo(sx,base-41);ctx.lineTo(sx,base-18);ctx.stroke();
  // ラジオ体操風に腕が動く
  const armAngle=Math.sin(t)*0.8;
  ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx+Math.cos(armAngle)*18,base-36+Math.sin(armAngle)*12);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx-Math.cos(armAngle)*18,base-36-Math.sin(armAngle)*12);ctx.stroke();
  // 足も動く
  ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx-8+Math.sin(t)*6,base-2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx+8-Math.sin(t)*6,base-2);ctx.stroke();
}

function drawSurprise(sx,base){
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=4;ctx.lineCap='round';ctx.fillStyle='#fff';
  // 驚いて少し後ろにのけぞる
  const lean=Math.min(S.surpriseTimer/80,1)*0.3;
  ctx.save();ctx.translate(sx,base-30);ctx.rotate(-lean);ctx.translate(-sx,-(base-30));
  ctx.beginPath();ctx.arc(sx,base-52,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(sx-3,base-56,5,3,-0.4);
  ctx.beginPath();ctx.moveTo(sx,base-41);ctx.lineTo(sx,base-18);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx+18,base-20);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx-18,base-20);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx-10,base-2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx+10,base-2);ctx.stroke();
  ctx.restore();
  // びっくりマーク
  if(S.surpriseTimer>40){
    ctx.fillStyle='#FAC775';ctx.font='bold 18px sans-serif';
    ctx.fillText('!?',sx+10,base-65);
  }
  const surpriseMsgs=['棒人間が突然何かに驚いた','何もないのに「うわっ」てなってた','棒人間がびびり倒してる'];
  if(S.surpriseTimer===79)sm(surpriseMsgs[Math.floor(Math.random()*surpriseMsgs.length)]);
  if(S.surpriseTimer>0)S.surpriseTimer--;
}
function drawBody(sx,base,type,cx2){
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=4;ctx.lineCap='round';ctx.fillStyle='#fff';
  if(type==='support'){ctx.beginPath();ctx.arc(sx,base-52,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(sx-3,base-56,5,3,-0.4);ctx.beginPath();ctx.moveTo(sx,base-41);ctx.lineTo(sx,base-18);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(cx2-2,base-75);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx-12,base-26);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx-10,base-2);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx+10,base-2);ctx.stroke();}
  else if(type==='water'){ctx.beginPath();ctx.arc(sx,base-52,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(sx-3,base-56,5,3,-0.4);ctx.beginPath();ctx.moveTo(sx,base-41);ctx.lineTo(sx,base-18);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx-20,base-26);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx+12,base-26);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx-10,base-2);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx+10,base-2);ctx.stroke();ctx.strokeStyle='#85B7EB';ctx.lineWidth=2;for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(sx-24+i*5,base-22);ctx.lineTo(sx-26+i*5,base-12);ctx.stroke();}}
  else if(type==='dance'){const a=Math.sin(S.frame*0.15)*0.35;ctx.beginPath();ctx.arc(sx,base-52,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(sx-3,base-56,5,3,-0.4);ctx.beginPath();ctx.moveTo(sx,base-41);ctx.lineTo(sx,base-18);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx+16,base-22+Math.sin(a)*6);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx-16,base-22-Math.sin(a)*6);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx-13,base-2);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx+13,base-2);ctx.stroke();}
  else if(type==='climb'){
    // 植物をよじ登る
    const W2=cv.width,cx2=W2/2;
    const climbH=Math.sin((120-S.climbTimer)/120*Math.PI)*50;
    ctx.strokeStyle='#1a1a1a';ctx.lineWidth=4;ctx.lineCap='round';ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(cx2,base-52-climbH,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(cx2-3,base-56-climbH,5,3,-0.4);
    ctx.beginPath();ctx.moveTo(cx2,base-41-climbH);ctx.lineTo(cx2,base-20-climbH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx2,base-36-climbH);ctx.lineTo(cx2+14,base-26-climbH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx2,base-36-climbH);ctx.lineTo(cx2-14,base-26-climbH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx2,base-20-climbH);ctx.lineTo(cx2-8,base-5-climbH);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx2,base-20-climbH);ctx.lineTo(cx2+8,base-5-climbH);ctx.stroke();
    if(S.climbTimer===119)sm('棒人間が植物をよじ登り始めた…');
    if(S.climbTimer>0)S.climbTimer--;
  }
  else{ctx.beginPath();ctx.arc(sx,base-52,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(sx-3,base-56,5,3,-0.4);ctx.beginPath();ctx.moveTo(sx,base-41);ctx.lineTo(sx,base-18);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx+14,base-24);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx-12,base-26);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx-10,base-2);ctx.stroke();ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx+10,base-2);ctx.stroke();}
}

function drawBird(W,H){
  if(!S.birdActive)return;
  const bx=S.birdX,by=S.birdY,wb=Math.sin(S.frame*0.2)*7,flip=S.birdVx>0;
  ctx.save();if(flip){ctx.translate(bx*2,0);ctx.scale(-1,1);}
  ol(()=>{ctx.beginPath();ctx.ellipse(bx,by,22,16,0.15,0,Math.PI*2);},'#F4C0D1','#993556',3);hl(bx-6,by-8,7,4,-0.3);
  ol(()=>{ctx.beginPath();ctx.ellipse(bx-6,by-8+wb,16,9,-0.5,0,Math.PI*2);},'#ED93B1','#993556',2);hl(bx-10,by-12+wb,5,3,-0.5);
  ol(()=>{ctx.beginPath();ctx.ellipse(bx+12,by-10,10,9,0.2,0,Math.PI*2);},'#F4C0D1','#993556',3);hl(bx+8,by-15,4,3,-0.3);
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(bx+16,by-12,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bx+15,by-13,1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FAEEDA';ctx.strokeStyle='#BA7517';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(bx+21,by-10);ctx.lineTo(bx+30,by-8);ctx.lineTo(bx+21,by-6);ctx.closePath();ctx.fill();ctx.stroke();
  if(S.birdHp<10&&S.frame%10<5){ctx.save();ctx.globalAlpha=0.25;ctx.fillStyle='#f00';ctx.beginPath();ctx.ellipse(bx,by,25,19,0,0,Math.PI*2);ctx.fill();ctx.restore();}
  ctx.restore();
}

let frame=0;
function tick(){
  frame++;S.frame=frame;S.dayTime=(S.dayTime+0.0004)%1;
  if(S.bird2TapDelay>0)S.bird2TapDelay--;
  if(S.bird2AutoTimer>0&&S.bird2Step===1){S.bird2AutoTimer--;if(S.bird2AutoTimer===0){S.bird2Step=2;S.bird2TapDelay=80;hide('ovBird2a');show('ovBird2b');sm('…ただ見てただけみたい。よかった😮‍💨');}}
  if(S.birdWarnTimer>0){S.birdWarnTimer--;if(S.birdWarnTimer===0&&S.birdWarn){S.birdWarn=false;hide('ovBird1w');S.birdActive=true;show('ovBird1a');show('evBird');show('hpw');el('hpf').style.width='100%';el('birdLeft').textContent='10';sm('🐦 鳥を直接タップして追い払え！');}}
  if(S.birdActive){
    S.birdX+=S.birdVx;
    S.birdY+=S.birdVy;
    // 上下バウンド
    if(S.birdY<15){S.birdVy=Math.abs(S.birdVy);}
    if(S.birdY>cv.height-60){S.birdVy=-Math.abs(S.birdVy);}
    // 左右バウンド（画面内を行き来する）
    if(S.birdX<20){S.birdVx=Math.abs(S.birdVx);}
    if(S.birdX>cv.width-20){S.birdVx=-Math.abs(S.birdVx);}
    // 制限時間（600フレーム＝約10秒）で逃げる
    S.birdEscTimer=(S.birdEscTimer||0)+1;
    if(S.birdEscTimer>600){
      S.birdActive=false;S.birdEscTimer=0;
      hide('evBird');hide('hpw');hide('ovBird1a');
      S.love=Math.max(0,S.love-15);ui();
      sm('鳥に荒らされた…棒人間がしょんぼりしてる');
    }
  }
  if(S.bird2Step===0&&false){}
  if(S.typhoonTimer>0){S.typhoonTimer--;if(S.typhoonTimer===0){S.typhoonActive=false;hide('evTy');hide('ovTyphoon');el('ty-arrow').style.display='none';if(!S.supported){S.love=Math.max(0,S.love-20);ui();sm('台風に耐えた…でも少しダメージを受けた');}else sm('棒人間が踏ん張った！お花は無事だった！');S.supported=false;}}
  if(S.sleepTimer>0){S.sleepTimer--;if(S.sleepTimer===0)S.sleeping=false;}
  if(S.sleepTimer2>0){S.sleepTimer2--;if(S.sleepTimer2===0){S.showSleep=false;hide('ovSleep');}}
  if(S.seedWaitTimer>0){S.seedWaitTimer--;if(S.seedWaitTimer===0){S.showSeedWait=false;hide('ovSeedWait');}}
  if(S.bloomTimer>0){S.bloomTimer--;if(S.bloomTimer===0){hide('ovBloom');S.showBloom=false;}}
  if(S.cryTimer>0)S.cryTimer--;
  if(S.singTimer>0){S.singTimer--;if(S.singTimer===0){S.showSing=false;hide('ovSing');}}
  if(S.monoTimer>0){S.monoTimer--;if(S.monoTimer===0){S.showMono=false;hideBalloon();}}if(S.monoCooldown>0)S.monoCooldown--;
  if(S.mushroomTimer>0){S.mushroomTimer--;if(S.mushroomTimer===0){S.showMushroom=false;el('ovMushroom').style.display='none';S.monoCooldown=Math.floor(Math.random()*(900-480)+480);}}
  if(S.witherTimer>0){S.witherTimer--;if(S.witherTimer===0)wither();}
  // 友人の動き
  if(S.friendPhase===1){
    S.friendX-=1.5;
    if(S.friendX<cv.width/2+60){S.friendPhase=2;S.friendTimer=200;}
  } else if(S.friendPhase===2){
    S.friendTimer--;
    if(S.friendTimer===0){S.friendPhase=3;sm('友達が帰っていった');}
  } else if(S.friendPhase===3){
    S.friendX+=1.5;
    if(S.friendX>cv.width+40){S.friendPhase=0;S.friendActive=false;}
  }
  if(frame%300===0&&!S.sleeping&&!S.birdActive&&!S.birdWarn&&!S.bird2Step&&!S.typhoonActive&&S.stage<4&&!S.mgActive&&S.friendPhase===0){
    const ct=Math.floor(Math.random()*10);
    S.cutType=ct;
    if(ct===4){S.climbTimer=120;}
    else if(ct===5){S.skipTimer=100;}
    else if(ct===6){S.ponderTimer=130;}
    else if(ct===7){S.radioTimer=110;}
    else if(ct===8){S.surpriseTimer=80;}
    else if(ct===9&&S.stage>=1){S.friendActive=true;S.friendX=cv.width+30;S.friendPhase=1;S.friendTimer=200;sm('なんか友達が来た');}
  }
  if(frame%220===0&&S.stage<4){S.water=Math.max(0,S.water-2);S.sun=Math.max(0,S.sun-1.5);ui();}
  if(frame%1800===0)saveGame();
  maybeEvent();
  const W=cv.width,H=cv.height;
  drawBg(W,H);drawPlant(W,H);drawMan(W,H);drawBird(W,H);
  requestAnimationFrame(tick);
}
function hideBalloon(){el('balloon').style.display='none';}

function saveGame(){
  const data={
    water:S.water,sun:S.sun,love:S.love,
    growth:S.growth,stage:S.stage,gen:S.gen,
    dayTime:S.dayTime
  };
  try{localStorage.setItem('flowerGame',JSON.stringify(data));}catch(e){}
}
function loadGame(){
  try{
    const raw=localStorage.getItem('flowerGame');
    if(!raw)return;
    const data=JSON.parse(raw);
    S.water=data.water||60;
    S.sun=data.sun||60;
    S.love=data.love||60;
    S.growth=data.growth||0;
    S.stage=data.stage||0;
    S.gen=data.gen||1;
    S.dayTime=data.dayTime||0;
    ui();
    sm(S.gen+'代目のお花、おかえり🌱');
  }catch(e){}
}
function startGame(){
  resize();
  loadGame();
  if(S.stage===0&&S.growth<5){
    show('ovSeedWait');S.showSeedWait=true;S.seedWaitTimer=150;
  }
  tick();
}
</script>
</body>
</html>
