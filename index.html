<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>お花育成ゲーム</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#1a1a2e;display:flex;justify-content:center;padding:16px;min-height:100vh;}
.g{width:100%;max-width:360px;font-family:sans-serif;background:#fff;border-radius:16px;overflow:hidden;}
.topbar{background:#f5f5f5;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;}
.stglabel{font-size:13px;color:#888;}.stgname{font-size:14px;font-weight:500;color:#333;}
.scene{height:240px;position:relative;overflow:hidden;cursor:pointer;}
canvas{position:absolute;inset:0;width:100%;height:100%;}
.ov{position:absolute;inset:0;display:none;align-items:center;justify-content:center;z-index:20;}
.ov.bw{background:rgba(0,0,0,0.6);}
.ov.bl{background:rgba(0,0,0,0.5);}
.ov.sl{background:rgba(0,0,0,0.4);}
.ov img{max-width:78%;max-height:80%;border-radius:12px;border:3px solid #fff;object-fit:contain;}
.evb{position:absolute;top:8px;left:16px;right:16px;text-align:center;font-size:12px;font-weight:500;color:#fff;padding:5px 10px;border-radius:8px;display:none;z-index:15;}
.evb.bi{background:rgba(180,50,50,0.9);}.evb.ty{background:rgba(30,70,200,0.9);}
.hpw{position:absolute;bottom:8px;left:16px;right:16px;height:8px;background:rgba(0,0,0,0.3);border-radius:4px;display:none;z-index:15;overflow:hidden;}
.hpf{height:100%;background:#E24B4A;border-radius:4px;transition:width 0.15s;}
.msg{background:#f5f5f5;padding:10px 16px;font-size:13px;color:#333;min-height:42px;line-height:1.5;}
.gen{font-size:11px;color:#aaa;padding:2px 16px 6px;}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:6px 12px;}
.stat{background:#f5f5f5;border-radius:8px;padding:8px;}
.slbl{font-size:11px;color:#888;margin-bottom:5px;}
.sb{height:5px;border-radius:3px;background:#e0e0e0;overflow:hidden;}
.sf{height:100%;border-radius:3px;transition:width 0.4s;}
.sf.w{background:#85B7EB;}.sf.s{background:#EF9F27;}.sf.l{background:#ED93B1;}
.acts{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;padding:0 12px 12px;}
button{background:#f5f5f5;border:1px solid #ddd;border-radius:8px;padding:8px 4px;cursor:pointer;font-size:11px;color:#333;font-family:sans-serif;}
button:active{transform:scale(0.96);}
.ic{font-size:18px;display:block;margin-bottom:3px;}
.pbw{height:3px;background:#e0e0e0;}.pbf{height:100%;background:#ED93B1;transition:width 0.6s;}
</style>
</head>

<script>
const STAGES=['🌱 たね','🌿 め','🌷 つぼみ','🌸 まんかい','🍂 かれた','🌰 たねはっけん'];
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),scene=document.getElementById('scene');
const ov=id=>document.getElementById(id);
let S={water:60,sun:60,love:60,growth:0,stage:0,gen:1,
  birdActive:false,birdX:420,birdY:50,birdVx:-2,birdHp:5,
  birdWarn:false,birdWarnTimer:0,
  typhoonActive:false,supported:false,typhoonTimer:0,
  witherTimer:0,sleeping:false,sleepTimer:0,
  showSleep:false,sleepImgTimer:0,showBloom:false,bloomTimer:0,
  cutType:0,frame:0,dayTime:0};
function resize(){cv.width=scene.offsetWidth;cv.height=scene.offsetHeight;}
resize();window.addEventListener('resize',resize);
const M={water:['じょうろでそーっと水をあげた','根っこまで届けー！って念じながら水やり','棒人間がミスって自分にもかかった…'],sun:['よっこいしょプランターを移動した','日当たりバッチリ！棒人間がドヤ顔した','棒人間が一緒に日向ぼっこした'],love:['鼻歌まじりで歌った♪','お花が嬉しそうに揺れた気がする','ちょっとハズレてたけど一生懸命歌った'],rest:['芽の横でごろんと昼寝した','すやすや…幸せそうに眠ってる','寝すぎて背中が痛そう']};
const CUTS=['棒人間がお花の隣でごろんと昼寝してる…','棒人間が水やりしながらひとり言を言ってる','棒人間がお花をじーっと覗き込んでいる','棒人間が突然踊り出した。お花が揺れた。'];
function sm(t){ov('msg').textContent=t;}
function ss(id,v){ov(id).style.width=Math.max(0,Math.min(100,v))+'%';}
function ui(){ss('bw',S.water);ss('bs',S.sun);ss('bl',S.love);ov('sn').textContent=STAGES[S.stage];ov('pb').style.width=Math.min(100,S.growth)+'%';ov('gen').textContent=S.gen+'代目';}
function ol(fn,fc,sc,lw){ctx.save();ctx.lineJoin='round';ctx.lineCap='round';ctx.strokeStyle=sc||'#1a1a1a';ctx.lineWidth=lw||3;fn();ctx.stroke();ctx.fillStyle=fc;fn();ctx.fill();ctx.restore();}
function hl(x,y,rx,ry,a){ctx.save();ctx.globalAlpha=0.38;ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(x,y,rx,ry,a||0,0,Math.PI*2);ctx.fill();ctx.restore();}
function checkGrowth(){
  if(S.stage>=3)return;
  const avg=(S.water+S.sun+S.love)/3;
  S.growth=Math.min(99.9,S.growth+(avg>50?1.2:0.3));
  if(S.growth>=75&&S.stage<3){S.stage=3;S.showBloom=true;S.bloomTimer=200;S.witherTimer=700;sm('🌸 まんかい！棒人間が飛び上がって喜んだ！');ov('ovBloom').style.display='flex';}
  else if(S.growth>=45&&S.stage<2)S.stage=2;
  else if(S.growth>=20&&S.stage<1)S.stage=1;
  ui();
}
function doAct(t){
  if(S.birdActive||S.birdWarn){sm('まず鳥を追い払って！');return;}
  if(S.typhoonActive){sm('台風中！タップで支えて！');return;}
  if(S.stage>=4){sm('今は種を見つけるのを待って…');return;}
  const i=Math.floor(Math.random()*3);
  if(t==='water'){S.water=Math.min(100,S.water+22);S.love=Math.min(100,S.love+3);}
  else if(t==='sun'){S.sun=Math.min(100,S.sun+22);S.water=Math.max(0,S.water-4);}
  else if(t==='love'){S.love=Math.min(100,S.love+22);S.sun=Math.min(100,S.sun+3);}
  else if(t==='rest'){S.sleeping=true;S.sleepTimer=160;S.showSleep=true;S.sleepImgTimer=100;S.love=Math.min(100,S.love+10);}
  sm(M[t][i]);checkGrowth();ui();
}
scene.addEventListener('click',()=>{
  if(S.birdWarn){S.birdWarn=false;S.birdWarnTimer=0;ov('ovBird').style.display='none';S.birdActive=true;ov('evBird').style.display='block';ov('hpw').style.display='block';sm('🐦 鳥が来た！タップして追い払え！');return;}
  if(S.birdActive){S.birdHp--;ov('hpf').style.width=(S.birdHp/5*100)+'%';if(S.birdHp<=0){S.birdActive=false;ov('evBird').style.display='none';ov('hpw').style.display='none';S.love=Math.min(100,S.love+18);ui();sm('棒人間が鳥を追い払った！お花は無事！');}else sm('もう少し！あと'+S.birdHp+'回タップ！');return;}
  if(S.typhoonActive){S.supported=true;S.love=Math.min(100,S.love+8);ui();sm('棒人間が必死で支えてる！がんばれ！');return;}
  if(S.showBloom){ov('ovBloom').style.display='none';S.showBloom=false;return;}
  if(S.stage===5)newGen();
});
function wither(){S.stage=4;ui();sm('お花が静かに枯れていく…でも綺麗だった');setTimeout(()=>{S.stage=5;ui();sm('枯れた花の中に種を見つけた！タップして次の代を植えよう🌰');},3000);}
function newGen(){S.gen++;S.water=60;S.sun=60;S.love=60;S.growth=0;S.stage=0;S.witherTimer=0;S.birdActive=false;S.birdWarn=false;S.typhoonActive=false;['evBird','evTyphoon','hpw','ovBird','ovBloom','ovSleep'].forEach(id=>{const e=ov(id);e.style.display='none';});ui();sm(S.gen+'代目の種を植えた。また一緒に育てよう🌱');}
function maybeEvent(){
  if(S.birdActive||S.birdWarn||S.typhoonActive||S.stage<1||S.stage>=4)return;
  const r=Math.random();
  if(r<0.0007){S.birdWarn=true;S.birdWarnTimer=100;S.birdHp=5;S.birdX=cv.width+40;S.birdY=28+Math.random()*38;S.birdVx=-2;ov('ovBird').style.display='flex';sm('なんか来る気がする…！画面タップで準備して！');}
  else if(r<0.0013){S.typhoonActive=true;S.supported=false;S.typhoonTimer=360;ov('evTyphoon').style.display='block';sm('🌀 台風が来た！お花が倒れそう！タップで支えて！');}
}
function drawBg(W,H){
  const d=S.dayTime,isNight=(d<0.2||d>0.85);
  const t=d<0.5?d/0.5:1-(d-0.5)/0.5;
  if(S.typhoonActive){ctx.fillStyle='#1a2040';ctx.fillRect(0,0,W,H);drawRain(W,H);}
  else{
    const g=ctx.createLinearGradient(0,0,0,H);
    const r1=Math.round(13+t*122),g1=Math.round(27+t*179),b1=Math.round(42+t*193);
    const r2=Math.round(17+t*83),g2=Math.round(32+t*148),b2=Math.round(26+t*94);
    g.addColorStop(0,`rgb(${r1},${g1},${b1})`);g.addColorStop(1,`rgb(${r2},${g2},${b2})`);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    if(isNight){drawStars(W,H);drawMoon(W,H);}else{drawSun(W,H,t);}
  }
  ctx.fillStyle='#3b6d11';ctx.fillRect(0,H-46,W,10);
  ctx.fillStyle='#5c3d2e';ctx.fillRect(0,H-36,W,36);
}
function drawStars(W,H){ctx.fillStyle='rgba(255,255,255,0.5)';[[28,16],[88,30],[195,11],[W-45,18],[W-18,36],[145,25],[W/2,8]].forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();});}
function drawSun(W,H,t){ol(()=>{ctx.beginPath();ctx.arc(W-36,25+t*5,18,0,Math.PI*2);},'#EF9F27','#BA7517',2);hl(W-42,22,7,5,-0.4);}
function drawMoon(W,H){ctx.fillStyle='#d0d8f0';ctx.beginPath();ctx.arc(W-36,28,14,0,Math.PI*2);ctx.fill();ctx.fillStyle='#162540';ctx.beginPath();ctx.arc(W-30,22,11,0,Math.PI*2);ctx.fill();}
function drawRain(W,H){ctx.strokeStyle='rgba(150,180,255,0.4)';ctx.lineWidth=1.2;for(let i=0;i<20;i++){const x=(S.frame*4+i*41)%W,y=(S.frame*5+i*57)%H;ctx.beginPath();ctx.moveTo(x,y);ctx.lineTo(x-9,y+20);ctx.stroke();}}
function drawPlant(W,H){
  const cx=W/2,base=H-36,s=S.stage;
  const tilt=S.typhoonActive&&!S.supported?Math.sin(S.frame*0.12)*0.2:0;
  ctx.save();ctx.translate(cx,base);ctx.rotate(tilt);ctx.translate(-cx,-base);
  if(s===0){ol(()=>{ctx.beginPath();ctx.ellipse(cx,base-10,12,8,0,0,Math.PI*2);},'#BA7517');ctx.strokeStyle='#1a1a1a';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,base-16);ctx.lineTo(cx,base-26);ctx.stroke();}
  else if(s===1){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-58);ctx.stroke();ctx.strokeStyle='#3b6d11';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-58);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx-22,base-46,24,12,-0.5,0,Math.PI*2);},'#97C459');hl(cx-26,base-50,8,4,-0.5);ol(()=>{ctx.beginPath();ctx.ellipse(cx+22,base-40,24,12,0.5,0,Math.PI*2);},'#97C459');hl(cx+18,base-44,8,4,0.5);}
  else if(s===2){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=5;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-75);ctx.stroke();ctx.strokeStyle='#3b6d11';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-75);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx-24,base-58,26,13,-0.5,0,Math.PI*2);},'#97C459');hl(cx-28,base-62,9,4,-0.5);ol(()=>{ctx.beginPath();ctx.ellipse(cx+24,base-52,26,13,0.5,0,Math.PI*2);},'#97C459');hl(cx+20,base-56,9,4,0.5);ol(()=>{ctx.beginPath();ctx.ellipse(cx,base-87,10,14,0,0,Math.PI*2);},'#F4C0D1');ol(()=>{ctx.beginPath();ctx.ellipse(cx-8,base-83,8,12,0.5,0,Math.PI*2);},'#ED93B1');ol(()=>{ctx.beginPath();ctx.ellipse(cx+8,base-83,8,12,-0.5,0,Math.PI*2);},'#ED93B1');}
  else if(s===3){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=6;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.bezierCurveTo(cx-4,base-40,cx+4,base-65,cx,base-95);ctx.stroke();ctx.strokeStyle='#3b6d11';ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(cx,base);ctx.bezierCurveTo(cx-4,base-40,cx+4,base-65,cx,base-95);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx-28,base-68,28,13,-0.5,0,Math.PI*2);},'#97C459');hl(cx-32,base-72,10,5,-0.5);ol(()=>{ctx.beginPath();ctx.ellipse(cx+28,base-62,28,13,0.5,0,Math.PI*2);},'#97C459');hl(cx+24,base-66,10,5,0.5);for(let i=0;i<5;i++){const a=i/5*Math.PI*2-Math.PI/2;ol(()=>{ctx.beginPath();ctx.ellipse(cx+Math.cos(a)*20,base-100+Math.sin(a)*20,15,9,a,0,Math.PI*2);},'#F4C0D1');}for(let i=0;i<5;i++){const a=i/5*Math.PI*2-Math.PI/2;hl(cx+Math.cos(a)*16,base-100+Math.sin(a)*16,5,3,a);}ol(()=>{ctx.beginPath();ctx.arc(cx,base-100,10,0,Math.PI*2);},'#FAC775');hl(cx-3,base-104,4,3);}
  else if(s===4){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx-8,base-55);ctx.stroke();ctx.strokeStyle='#8a7040';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx-8,base-55);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx-20,base-48,18,9,-0.6,0,Math.PI*2);},'#b8a060');ol(()=>{ctx.beginPath();ctx.ellipse(cx+8,base-44,16,8,0.4,0,Math.PI*2);},'#b8a060');ol(()=>{ctx.beginPath();ctx.arc(cx-8,base-66,12,0,Math.PI*2);},'#c8a060');}
  else if(s===5){ctx.strokeStyle='#1a1a1a';ctx.lineWidth=3;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-38);ctx.stroke();ctx.strokeStyle='#8a7040';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,base);ctx.lineTo(cx,base-38);ctx.stroke();ol(()=>{ctx.beginPath();ctx.ellipse(cx,base-48,14,11,0,0,Math.PI*2);},'#BA7517');hl(cx-4,base-52,5,3.5);ctx.strokeStyle='#FAC775';ctx.lineWidth=2;for(let i=0;i<6;i++){const a=i/6*Math.PI*2;ctx.beginPath();ctx.moveTo(cx+Math.cos(a)*17,base-48+Math.sin(a)*12);ctx.lineTo(cx+Math.cos(a)*23,base-48+Math.sin(a)*17);ctx.stroke();}}
  ctx.restore();
}
function drawMan(W,H){
  const base=H-36,cx=W/2;
  if(S.showSleep){const el=ov('ovSleep');el.style.display='flex';return;}
  else{const el=ov('ovSleep');if(el.style.display==='flex'&&!S.showSleep)el.style.display='none';}
  if(S.sleeping){drawBody(cx-54,base,'sleep');return;}
  if(S.typhoonActive){drawBody(cx-52,base,'support',cx);return;}
  if(S.cutType===1){drawBody(cx+55,base,'water');return;}
  if(S.cutType===3){drawBody(cx+55,base,'dance');return;}
  drawBody(cx-54,base,'stand');
}
function drawBody(sx,base,type,cx2){
  ctx.strokeStyle='#1a1a1a';ctx.lineWidth=4;ctx.lineCap='round';ctx.fillStyle='#fff';
  if(type==='sleep'){
    ctx.beginPath();ctx.arc(sx,base-22,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(sx-3,base-26,5,3,-0.4);
    ctx.beginPath();ctx.moveTo(sx-22,base-10);ctx.lineTo(sx+24,base-10);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx-22,base-10);ctx.lineTo(sx-22,base);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx+24,base-10);ctx.lineTo(sx+24,base);ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.7)';ctx.font='bold 12px sans-serif';ctx.fillText('z z z',sx+14,base-32);
  } else if(type==='support'){
    ctx.beginPath();ctx.arc(sx,base-52,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(sx-3,base-56,5,3,-0.4);
    ctx.beginPath();ctx.moveTo(sx,base-41);ctx.lineTo(sx,base-18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(cx2-2,base-75);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx-12,base-26);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx-10,base-2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx+10,base-2);ctx.stroke();
  } else if(type==='water'){
    ctx.beginPath();ctx.arc(sx,base-52,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(sx-3,base-56,5,3,-0.4);
    ctx.beginPath();ctx.moveTo(sx,base-41);ctx.lineTo(sx,base-18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx-20,base-26);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx+12,base-26);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx-10,base-2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx+10,base-2);ctx.stroke();
    ctx.strokeStyle='#85B7EB';ctx.lineWidth=2;for(let i=0;i<3;i++){ctx.beginPath();ctx.moveTo(sx-24+i*5,base-22);ctx.lineTo(sx-26+i*5,base-12);ctx.stroke();}
  } else if(type==='dance'){
    const a=Math.sin(S.frame*0.15)*0.35;
    ctx.beginPath();ctx.arc(sx,base-52,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(sx-3,base-56,5,3,-0.4);
    ctx.beginPath();ctx.moveTo(sx,base-41);ctx.lineTo(sx,base-18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx+16,base-22+Math.sin(a)*6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx-16,base-22-Math.sin(a)*6);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx-13,base-2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx+13,base-2);ctx.stroke();
  } else {
    ctx.beginPath();ctx.arc(sx,base-52,11,0,Math.PI*2);ctx.fill();ctx.stroke();hl(sx-3,base-56,5,3,-0.4);
    ctx.beginPath();ctx.moveTo(sx,base-41);ctx.lineTo(sx,base-18);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx+14,base-24);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-36);ctx.lineTo(sx-12,base-26);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx-10,base-2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(sx,base-18);ctx.lineTo(sx+10,base-2);ctx.stroke();
  }
}
function drawBird(W,H){
  if(!S.birdActive)return;
  const bx=S.birdX,by=S.birdY,wb=Math.sin(S.frame*0.2)*7;
  const flip=S.birdVx>0;
  ctx.save();if(flip){ctx.translate(bx*2,0);ctx.scale(-1,1);}
  ol(()=>{ctx.beginPath();ctx.ellipse(bx,by,22,16,0.15,0,Math.PI*2);},'#F4C0D1','#993556',3);hl(bx-6,by-8,7,4,-0.3);
  ol(()=>{ctx.beginPath();ctx.ellipse(bx-6,by-8+wb,16,9,-0.5,0,Math.PI*2);},'#ED93B1','#993556',2);hl(bx-10,by-12+wb,5,3,-0.5);
  ol(()=>{ctx.beginPath();ctx.ellipse(bx+12,by-10,10,9,0.2,0,Math.PI*2);},'#F4C0D1','#993556',3);hl(bx+8,by-15,4,3,-0.3);
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(bx+16,by-12,2.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(bx+15,by-13,1,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#FAEEDA';ctx.strokeStyle='#BA7517';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(bx+21,by-10);ctx.lineTo(bx+30,by-8);ctx.lineTo(bx+21,by-6);ctx.closePath();ctx.fill();ctx.stroke();
  ctx.restore();
}
let frame=0;
function tick(){
  frame++;S.frame=frame;
  S.dayTime=(S.dayTime+0.0004)%1;
  if(S.birdWarnTimer>0){S.birdWarnTimer--;if(S.birdWarnTimer===0&&S.birdWarn){S.birdWarn=false;ov('ovBird').style.display='none';S.birdActive=true;ov('evBird').style.display='block';ov('hpw').style.display='block';sm('🐦 鳥が来た！タップして追い払え！');}}
  if(S.birdActive){S.birdX+=S.birdVx;if(S.birdX<cv.width/2-20)S.birdVx=2;if(S.birdX>cv.width+60){S.birdActive=false;ov('evBird').style.display='none';ov('hpw').style.display='none';S.love=Math.max(0,S.love-15);ui();sm('鳥に荒らされた…棒人間がしょんぼりしてる');}}
  if(S.typhoonTimer>0){S.typhoonTimer--;if(S.typhoonTimer===0){S.typhoonActive=false;ov('evTyphoon').style.display='none';if(!S.supported){S.love=Math.max(0,S.love-20);ui();sm('台風に耐えた…でも少しダメージを受けた');}else sm('棒人間が支え続けた！お花は無事だった！');S.supported=false;}}
  if(S.sleepTimer>0){S.sleepTimer--;if(S.sleepTimer===0)S.sleeping=false;}
  if(S.sleepImgTimer>0){S.sleepImgTimer--;if(S.sleepImgTimer===0)S.showSleep=false;}
  if(S.bloomTimer>0){S.bloomTimer--;if(S.bloomTimer===0){ov('ovBloom').style.display='none';S.showBloom=false;}}
  if(S.witherTimer>0){S.witherTimer--;if(S.witherTimer===0)wither();}
  if(frame%300===0&&!S.sleeping&&!S.birdActive&&!S.typhoonActive&&S.stage<4){S.cutType=Math.floor(Math.random()*4);sm(CUTS[S.cutType]);}
  if(frame%220===0&&S.stage<4){S.water=Math.max(0,S.water-4);S.sun=Math.max(0,S.sun-3);ui();}
  maybeEvent();
  const W=cv.width,H=cv.height;
  drawBg(W,H);drawPlant(W,H);drawMan(W,H);drawBird(W,H);
  requestAnimationFrame(tick);
}
tick();
</script>
